<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Order Form</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f7f7f7;
    padding: 20px;
  }
  h2 {
    text-align: center;
  }
  form {
    background-color: #fff;
    padding: 20px;
    border-radius: 8px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  label {
    display: block;
    margin-top: 15px;
  }
  input, textarea, select {
    width: 90%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }
  button {
    margin-top: 20px;
    padding: 10px 15px;
    background-color: #28a745;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover {
    background-color: #218838;
  }
  .error {
    color: red;
    font-size: 0.9em;
  }
</style>
</head>
<body>

<h2>Customer Order Form</h2>

<form id="orderForm">
  <label>Full Name:</label>
  <input type="text" id="name" placeholder="Enter your full name">
  <span class="error" id="nameError"></span>

  <label>Email Address:</label>
  <input type="email" id="email" placeholder="Enter your email">
  <span class="error" id="emailError"></span>

  <label>Phone Number:</label>
  <input type="text" id="phone" placeholder="Enter your phone number">
  <span class="error" id="phoneError"></span>

  <label>Delivery Address:</label>
  <textarea id="address" placeholder="Enter your delivery address"></textarea>
  <span class="error" id="addressError"></span>

  <label>Payment Method:</label>
  <select id="payment">
    <option value="">Select payment method</option>
    <option value="COD">Cash on Delivery</option>
    <option value="Card">Gcash</option>
  </select>
  <span class="error" id="paymentError"></span>

  <button type="submit">Submit Order</button>
</form>

<script>
document.getElementById('orderForm').addEventListener('submit', function(event) {
  event.preventDefault();

  // Clear previous errors
  document.querySelectorAll('.error').forEach(el => el.textContent = '');

  let isValid = true;

  // Validate fields
  if (!document.getElementById('name').value.trim()) {
    document.getElementById('nameError').textContent = 'Full Name is required';
    isValid = false;
  }

  const email = document.getElementById('email').value.trim();
  if (!email) {
    document.getElementById('emailError').textContent = 'Email is required';
    isValid = false;
  } else if (!/\S+@\S+\.\S+/.test(email)) {
    document.getElementById('emailError').textContent = 'Invalid email format';
    isValid = false;
  }

  if (!document.getElementById('phone').value.trim()) {
    document.getElementById('phoneError').textContent = 'Phone Number is required';
    isValid = false;
  }

  if (!document.getElementById('address').value.trim()) {
    document.getElementById('addressError').textContent = 'Address is required';
    isValid = false;
  }

  if (!document.getElementById('payment').value) {
    document.getElementById('paymentError').textContent = 'Select a payment method';
    isValid = false;
  }

  if (isValid) {
    alert('Order submitted successfully!');
    // Here you can send the form data to your server
    document.getElementById('orderForm').reset();
  }
});
</script>

</body>
</html>
